<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery App - Thư Viện Cá Nhân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .image-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                <span class="p-2 bg-indigo-600 text-white rounded-lg">GA</span>
                Gallery App
            </h1>
            <div class="flex items-center gap-4">
                <input type="text" id="searchInput" placeholder="Tìm kiếm ảnh..." 
                    class="hidden md:block w-64 px-4 py-2 bg-slate-100 border-none rounded-full text-sm focus:ring-2 focus:ring-indigo-400 transition">
                <button class="text-sm font-medium text-slate-600 hover:text-indigo-600">Đăng xuất</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-10">
            <h2 class="text-lg font-semibold text-slate-800 mb-4">Tải ảnh mới lên hệ thống</h2>
            <form id="uploadForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tên ảnh</label>
                    <input type="text" id="title" placeholder="Nhập tên ảnh..." required 
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-indigo-500 outline-none transition">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Mô tả</label>
                    <input type="text" id="desc" placeholder="Mô tả ngắn..." 
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-indigo-500 outline-none transition">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Chọn file</label>
                    <input type="file" id="file" required 
                        class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition">
                </div>
                <button type="submit" 
                    class="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-200 transition active:scale-95">
                    Tải lên ngay
                </button>
            </form>
        </section>

        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Thư viện của tôi</h2>
                <span id="counter" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full">0 ảnh</span>
            </div>

            <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>
    </main>

    <script src="scr/api.js"></script>
    <script>
        const gallery = document.getElementById('gallery');
        const uploadForm = document.getElementById('uploadForm');
        const searchInput = document.getElementById('searchInput');

        // 1. Hàm lấy danh sách ảnh từ Backend và hiển thị
        async function renderPhotos(search = "") {
            try {
                const photos = await fetchPhotos(search);
                
                document.getElementById('counter').innerText = `${photos.length} ảnh`;
                
                if (photos.length === 0) {
                    gallery.innerHTML = `<p class="col-span-full text-center py-20 text-slate-400 italic">Thư viện trống. Hãy tải ảnh đầu tiên!</p>`;
                    return;
                }

                gallery.innerHTML = photos.map(photo => `
                    <div class="image-card group bg-white rounded-2xl overflow-hidden border border-slate-200 shadow-sm hover:shadow-xl transition-all duration-300">
                        <div class="relative h-56 overflow-hidden">
                            <img src="${API_BASE}/${photo.image_url}" 
                                 class="w-full h-full object-cover transition-transform duration-500">
                            <button onclick="removePhoto(${photo.id})" 
                                class="absolute top-3 right-3 p-2 bg-red-500 text-white rounded-lg opacity-0 group-hover:opacity-100 transition shadow-lg hover:bg-red-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-slate-800 truncate">${photo.title}</h3>
                            <p class="text-sm text-slate-500 line-clamp-2 mt-1">${photo.description || 'Không có mô tả'}</p>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Lỗi khi tải ảnh:", error);
            }
        }

        // 2. Xử lý sự kiện Tải ảnh lên
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('desc', document.getElementById('desc').value);
            formData.append('file', document.getElementById('file').files[0]);

            const btn = uploadForm.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Đang tải...";
            btn.disabled = true;

            try {
                const result = await uploadPhoto(formData);
                console.log("Kết quả upload:", result);
                
                // Reset form và render lại danh sách ảnh ngay lập tức
                uploadForm.reset();
                renderPhotos(); 
                
            } catch (err) {
                console.error("Lỗi khi tải ảnh lên:", err);
                alert("Lỗi khi tải ảnh lên!");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        // 3. Xử lý Xóa ảnh
        async function removePhoto(id) {
            if (confirm("Bạn có chắc chắn muốn xóa ảnh này?")) {
                try {
                    await deletePhoto(id);
                    renderPhotos(); // Cập nhật lại giao diện
                } catch (error) {
                    console.error("Lỗi khi xóa ảnh:", error);
                }
            }
        }

        // 4. Tìm kiếm ảnh
        searchInput.addEventListener('input', (e) => {
            renderPhotos(e.target.value);
        });

        // Khởi chạy khi vào trang
        renderPhotos();
    </script>
</body>
</html>
